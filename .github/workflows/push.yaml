name: ci

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm run test

      - name: Build docs
        run: pnpm run build

      - name: Package
        run: pnpm run package

      # internal-resolution-error is svelte-package's canonical .svelte.d.ts
      # layout, unresolvable by plain tsc under node16 for every Svelte lib;
      # real consumers resolve through bundler/svelte tooling.
      - name: Check published types
        run: pnpm run check:package

      - name: Detect dead code and dependencies
        run: pnpm run knip
